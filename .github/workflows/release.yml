name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          mkdir -p keys
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keys/torikomi-release.jks

      - name: Build Release APK
        env:
          TORIKOMI_STOREFILE: ${{ github.workspace }}/keys/torikomi-release.jks
          TORIKOMI_STOREPASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          TORIKOMI_KEYALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          TORIKOMI_KEYPASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Get version name
        id: version
        run: |
          VERSION=$(./gradlew -q printVersionName 2>/dev/null || echo "${{ github.ref_name }}")
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          mv "$APK_PATH" "torikomi-${{ github.ref_name }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Torikomi ${{ github.ref_name }}"
          body: |
            ## Release ${{ github.ref_name }}

            ### Download
            Install the APK below on your Android device (Android 7.0+).
          files: "torikomi-${{ github.ref_name }}.apk"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
