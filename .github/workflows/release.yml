name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          mkdir -p keys
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keys/torikomi-release.jks

      - name: Build Release APK
        env:
          TORIKOMI_STOREFILE: ${{ github.workspace }}/keys/torikomi-release.jks
          TORIKOMI_STOREPASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          TORIKOMI_KEYALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          TORIKOMI_KEYPASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Get version name
        id: version
        run: |
          VERSION=$(./gradlew -q printVersionName 2>/dev/null || echo "${{ github.ref_name }}")
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          mv "$APK_PATH" "torikomi-${{ github.ref_name }}.apk"

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found, using full history."
            RANGE="$CURRENT_TAG"
            COMPARE_LINE=""
          else
            echo "Generating changelog from $PREVIOUS_TAG to $CURRENT_TAG"
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
            COMPARE_LINE="**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
          fi

          COMMITS=$(git log --no-merges --pretty=format:"- %s (%h)" "$RANGE")

          if [ -z "$COMMITS" ]; then
            COMMITS="- No notable changes."
          fi

          {
            echo "log<<__CHANGELOG_EOF__"
            echo "$COMMITS"
            if [ -n "$COMPARE_LINE" ]; then
              echo ""
              echo "$COMPARE_LINE"
            fi
            echo "__CHANGELOG_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Torikomi ${{ github.ref_name }}"
          body: |
            ## Release ${{ github.ref_name }}

            ### Changelog
            ${{ steps.changelog.outputs.log }}

            ### Download
            Install the APK below on your Android device (Android 7.0+).
          files: "torikomi-${{ github.ref_name }}.apk"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
